<div class="auth-card">
  <div class="auth-brand">
    <div class="mark">IT</div>
    <h1>InsureTech CRM</h1>
    <p>Ingrese sus credenciales para continuar</p>
  </div>

  <div class="auth-error" *ngIf="errorMessage()">{{ errorMessage() }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-field">
      <label for="email">Correo electrónico</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="username"
        [class.invalid]="form.controls.email.invalid && form.controls.email.touched"
      />
      <span class="field-error" *ngIf="form.controls.email.invalid && form.controls.email.touched">
        Ingrese un correo electrónico válido.
      </span>
    </div>

    <div class="form-field">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        [class.invalid]="form.controls.password.invalid && form.controls.password.touched"
      />
      <span class="field-error" *ngIf="form.controls.password.invalid && form.controls.password.touched">
        La contraseña es obligatoria.
      </span>
    </div>

    <button type="submit" class="btn btn-primary" style="width: 100%;" [disabled]="submitting()">
      {{ submitting() ? 'Ingresando...' : 'Iniciar sesión' }}
    </button>
  </form>

  <div class="auth-footer">
    ¿No tiene una cuenta? <a routerLink="/register">Regístrese aquí</a>
  </div>
</div>
