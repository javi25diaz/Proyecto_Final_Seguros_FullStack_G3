<div class="page-header">
  <div>
    <h1>{{ isEditMode() ? 'Editar pago' : 'Nuevo pago' }}</h1>
    <p>Registre el pago asociado a una póliza</p>
  </div>
</div>

<div class="card" style="max-width: 720px;">
  <div class="loading-state" *ngIf="loading()">Cargando...</div>
  <div *ngIf="errorMessage()" style="background: var(--color-danger-bg); color: var(--color-danger); padding: 0.6rem 0.8rem; border-radius: var(--radius-sm); margin-bottom: 1rem;">
    {{ errorMessage() }}
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate *ngIf="!loading()">
    <div class="form-grid">
      <div class="form-field">
        <label for="policy">Póliza</label>
        <select id="policy" formControlName="policy" [class.invalid]="form.controls.policy.invalid && form.controls.policy.touched">
          <option value="">Seleccione una póliza</option>
          <option *ngFor="let policy of policies()" [value]="policy._id">{{ policy.policyNumber }}</option>
        </select>
        <span class="field-error" *ngIf="form.controls.policy.invalid && form.controls.policy.touched">Debe seleccionar una póliza.</span>
      </div>

      <div class="form-field">
        <label for="amount">Monto (B/.)</label>
        <input id="amount" type="number" step="0.01" min="0.01" formControlName="amount" [class.invalid]="form.controls.amount.invalid && form.controls.amount.touched" />
        <span class="field-error" *ngIf="form.controls.amount.invalid && form.controls.amount.touched">El monto debe ser mayor que cero.</span>
      </div>

      <div class="form-field">
        <label for="paymentDate">Fecha de pago</label>
        <input id="paymentDate" type="date" formControlName="paymentDate" [class.invalid]="form.controls.paymentDate.invalid && form.controls.paymentDate.touched" />
        <span class="field-error" *ngIf="form.controls.paymentDate.invalid && form.controls.paymentDate.touched">La fecha de pago es obligatoria.</span>
      </div>

      <div class="form-field">
        <label for="method">Método</label>
        <select id="method" formControlName="method">
          <option value="cash">Efectivo</option>
          <option value="card">Tarjeta</option>
          <option value="transfer">Transferencia</option>
          <option value="other">Otro</option>
        </select>
      </div>

      <div class="form-field">
        <label for="status">Estado</label>
        <select id="status" formControlName="status">
          <option value="pending">Pendiente</option>
          <option value="paid">Pagado</option>
          <option value="reversed">Revertido</option>
        </select>
      </div>

      <div class="form-field">
        <label for="reference">Referencia</label>
        <input id="reference" type="text" formControlName="reference" />
      </div>
    </div>

    <div class="form-field">
      <label for="notes">Notas</label>
      <textarea id="notes" rows="3" formControlName="notes"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="submitting()">{{ submitting() ? 'Guardando...' : 'Guardar' }}</button>
      <a routerLink="/payments" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
