<div class="page-header">
  <div>
    <h1>{{ isEditMode() ? 'Editar reclamación' : 'Nueva reclamación' }}</h1>
    <p>Los cambios de estado se gestionan desde el detalle de la reclamación</p>
  </div>
</div>

<div class="card" style="max-width: 720px;">
  <div class="loading-state" *ngIf="loading()">Cargando...</div>
  <div *ngIf="errorMessage()" style="background: var(--color-danger-bg); color: var(--color-danger); padding: 0.6rem 0.8rem; border-radius: var(--radius-sm); margin-bottom: 1rem;">
    {{ errorMessage() }}
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate *ngIf="!loading()">
    <div class="form-grid">
      <div class="form-field">
        <label for="incident">Siniestro</label>
        <select id="incident" formControlName="incident" [class.invalid]="form.controls.incident.invalid && form.controls.incident.touched">
          <option value="">Seleccione un siniestro</option>
          <option *ngFor="let incident of incidents()" [value]="incident._id">{{ incident.incidentNumber }}</option>
        </select>
        <span class="field-error" *ngIf="form.controls.incident.invalid && form.controls.incident.touched">Debe seleccionar un siniestro.</span>
      </div>

      <div class="form-field">
        <label for="amountRequested">Monto solicitado (B/.)</label>
        <input id="amountRequested" type="number" step="0.01" min="0.01" formControlName="amountRequested" [class.invalid]="form.controls.amountRequested.invalid && form.controls.amountRequested.touched" />
        <span class="field-error" *ngIf="form.controls.amountRequested.invalid && form.controls.amountRequested.touched">El monto solicitado debe ser mayor que cero.</span>
      </div>
    </div>

    <div class="form-field">
      <label for="description">Descripción</label>
      <textarea id="description" rows="3" formControlName="description" [class.invalid]="form.controls.description.invalid && form.controls.description.touched"></textarea>
      <span class="field-error" *ngIf="form.controls.description.invalid && form.controls.description.touched">La descripción es obligatoria.</span>
    </div>

    <div class="form-field">
      <label for="documentUrls">URLs de documentos (separadas por coma, opcional)</label>
      <input id="documentUrls" type="text" formControlName="documentUrls" placeholder="https://..., https://..." />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="submitting()">{{ submitting() ? 'Guardando...' : 'Guardar' }}</button>
      <a routerLink="/claims" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
